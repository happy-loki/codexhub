  <text x="344" y="248" font-size="10" fill="rgb(82,91,105)">Reasoning effort</text>
  <rect x="344" y="254" width="240" height="30" fill="rgb(238,241,245)" stroke="rgb(208,214,222)"/>
  <rect x="504" y="254" width="80" height="30" fill="rgb(36,99,235)"/>
  <text x="366" y="274" font-size="11" fill="rgb(124,133,146)">low</text>
  <text x="426" y="274" font-size="11" fill="rgb(124,133,146)">medium</text>
  <text x="524" y="274" font-size="11" fill="rgb(255,255,255)">high</text>
