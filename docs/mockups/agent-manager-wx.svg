  <text x="640" y="128" font-size="10" fill="rgb(82,91,105)">Model</text>
  <rect x="640" y="134" width="284" height="30" fill="rgb(255,255,255)" stroke="rgb(208,214,222)"/>
  <text x="652" y="154" font-size="12" fill="rgb(23,28,36)">gpt-5-codex</text>
  <path d="M905 145 l6 6 l6 -6" fill="none" stroke="rgb(124,133,146)" stroke-width="1.5"/>

