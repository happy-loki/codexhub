    <text x="360" y="564" fill="rgb(94,103,117)">3</text>
    <text x="390" y="564" fill="rgb(26,84,160)">model</text><text x="435" y="564" fill="rgb(92,99,112)"> = </text><text x="457" y="564" fill="rgb(20,124,74)">"gpt-5-codex"</text>
    <text x="360" y="586" fill="rgb(94,103,117)">4</text>
    <text x="390" y="586" fill="rgb(26,84,160)">model_reasoning_effort</text><text x="565" y="586" fill="rgb(92,99,112)"> = </text><text x="587" y="586" fill="rgb(20,124,74)">"high"</text>
    <text x="360" y="608" fill="rgb(94,103,117)">5</text>
    <text x="390" y="608" fill="rgb(26,84,160)">approval_policy</text><text x="510" y="608" fill="rgb(92,99,112)"> = </text><text x="532" y="608" fill="rgb(20,124,74)">"on-request"</text>
    <text x="360" y="630" fill="rgb(94,103,117)">6</text>
    <text x="360" y="652" fill="rgb(94,103,117)">7</text>
    <text x="390" y="652" fill="rgb(26,84,160)">developer_instructions</text><text x="565" y="652" fill="rgb(92,99,112)"> = </text><text x="587" y="652" fill="rgb(151,71,0)">"""</text>
    <text x="360" y="674" fill="rgb(94,103,117)">8</text>
    <text x="390" y="674" fill="rgb(38,45,56)">You are a senior code reviewer.</text>
    <text x="360" y="696" fill="rgb(94,103,117)">9</text>
    <text x="390" y="696" fill="rgb(38,45,56)">Focus on correctness, security,</text>
    <text x="360" y="718" fill="rgb(94,103,117)">10</text>
    <text x="390" y="718" fill="rgb(38,45,56)">and performance.</text>
    <text x="360" y="740" fill="rgb(94,103,117)">11</text>
    <text x="390" y="740" fill="rgb(151,71,0)">"""</text>
