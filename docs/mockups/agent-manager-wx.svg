  <rect x="344" y="194" width="580" height="30" fill="rgb(255,255,255)" stroke="rgb(208,214,222)"/>
  <text x="356" y="214" font-size="12" fill="rgb(23,28,36)">Professional code review: defects, performance, security.</text>

