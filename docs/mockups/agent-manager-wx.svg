    <text x="390" y="520" fill="rgb(26,84,160)">name</text><text x="430" y="520" fill="rgb(92,99,112)"> = </text><text x="452" y="520" fill="rgb(20,124,74)">"code-reviewer"</text>
    <text x="360" y="542" fill="rgb(94,103,117)">2</text>
