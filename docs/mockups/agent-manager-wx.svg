<svg width="1360" height="860" viewBox="0 0 1360 860" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Tahoma, sans-serif">
  <!-- Rendered to match src/gui/theme.rs light tokens and flat_bordered_panel (square 1px borders). -->
