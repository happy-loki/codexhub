  <text x="356" y="336" font-size="12" fill="rgb(23,28,36)">You are a senior code reviewer.</text>
  <text x="356" y="358" font-size="12" fill="rgb(23,28,36)">Focus on correctness, security, and performance.</text>
  <text x="356" y="380" font-size="12" fill="rgb(23,28,36)">Report findings first, with file references and</text>
  <text x="356" y="402" font-size="12" fill="rgb(23,28,36)">concrete fixes.</text>

